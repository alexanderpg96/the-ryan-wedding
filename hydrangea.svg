<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Blue Hydrangea flower cluster -->
  <!-- Top flower -->
  <g fill="#5B8DB8" opacity="0.9">
    <circle cx="32" cy="16" r="5"/>
    <circle cx="27" cy="20" r="5"/>
    <circle cx="37" cy="20" r="5"/>
    <circle cx="32" cy="24" r="5"/>
  </g>
  <!-- Left flower -->
  <g fill="#7BA7CC" opacity="0.85">
    <circle cx="20" cy="24" r="5"/>
    <circle cx="15" cy="28" r="5"/>
    <circle cx="25" cy="28" r="5"/>
    <circle cx="20" cy="32" r="5"/>
  </g>
  <!-- Right flower -->
  <g fill="#4A7FA8" opacity="0.9">
    <circle cx="44" cy="24" r="5"/>
    <circle cx="39" cy="28" r="5"/>
    <circle cx="49" cy="28" r="5"/>
    <circle cx="44" cy="32" r="5"/>
  </g>
  <!-- Center flower -->
  <g fill="#8FBDD9">
    <circle cx="32" cy="30" r="5"/>
    <circle cx="27" cy="34" r="5"/>
    <circle cx="37" cy="34" r="5"/>
    <circle cx="32" cy="38" r="5"/>
  </g>
  <!-- Bottom left -->
  <g fill="#7BA7CC" opacity="0.8">
    <circle cx="24" cy="40" r="4"/>
    <circle cx="20" cy="36" r="4"/>
  </g>
  <!-- Bottom right -->
  <g fill="#5B8DB8" opacity="0.8">
    <circle cx="40" cy="40" r="4"/>
    <circle cx="44" cy="36" r="4"/>
  </g>
  <!-- Small center dots for depth -->
  <circle cx="32" cy="20" r="1.5" fill="#3A6B8C" opacity="0.6"/>
  <circle cx="20" cy="28" r="1.5" fill="#3A6B8C" opacity="0.6"/>
  <circle cx="44" cy="28" r="1.5" fill="#3A6B8C" opacity="0.6"/>
  <circle cx="32" cy="34" r="1.5" fill="#3A6B8C" opacity="0.6"/>
  <!-- Stem -->
  <path d="M32 42 Q32 50 30 56" stroke="#5A7A5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M30 50 Q24 46 20 50 Q24 52 30 50Z" fill="#6B8E6B" opacity="0.8"/>
  <path d="M31 54 Q37 50 40 54 Q36 56 31 54Z" fill="#6B8E6B" opacity="0.8"/>
</svg>
